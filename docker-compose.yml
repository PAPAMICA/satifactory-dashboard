# FICSIT Control — Docker Compose
#
# Traefik (exemple) : router vers ce service sur le port 3000, TLS via certresolver.
# labels:
#   traefik.enable: "true"
#   traefik.http.routers.sf.rule: Host(`dashboard.example.com`)
#   traefik.http.routers.sf.entrypoints: websecure
#   traefik.http.routers.sf.tls.certresolver: letsencrypt
#   traefik.http.services.sf.loadbalancer.server.port: 3000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ficsit
      POSTGRES_PASSWORD: ficsit
      POSTGRES_DB: ficsit_control
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficsit -d ficsit_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://ficsit:ficsit@db:5432/ficsit_control
      DATA_DIR: /data
      # Optionnel : premier compte admin si la base est vide
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-}
    volumes:
      - satifactory-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  satifactory-data:
